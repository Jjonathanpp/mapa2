<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Un regalo de cumpleaños con música, fotos y letras que se descubren al hacer scroll."
    />
    <title>frase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Parisienne&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>

    <header class="hero section reveal">
      <p class="eyebrow">Feliz cumpleaños 🎂</p>
      <h1>frase</h1>
      <p class="subtitle">
        Esta pagina que hice es para vos, desliza con el dedo we
      </p>

      <div class="audio-panel" role="group" aria-label="Controles de música">
        <button id="toggleMusic" class="btn" type="button">▶️ Empezar canción</button>
        <p id="musicStatus" class="music-status">Toque para iniciar la música.</p>
        <button id="openPlayer" class="btn btn-secondary" type="button">.</button>
      </div>
      <audio id="bgMusic" loop preload="metadata" playsinline src="assets/song.mp3"></audio>
    </header>

    <main>
      <section class="memory section reveal">
        <figure class="photo-card">
          <img
            src="assets/photo-1.svg"
            alt="Recuerdo de los dos sonriendo"
            loading="lazy"
          />
        </figure>
        <p class="lyric">“frase”</p>
      </section>

      <section class="memory section reveal">
        <figure class="photo-card">
          <img
            src="assets/photo-2.svg"
            alt="Foto abrazados en un paseo"
            loading="lazy"
          />
        </figure>
        <p class="lyric">“frase”</p>
      </section>

      <section class="memory section reveal">
        <figure class="photo-card">
          <img
            src="assets/photo-3.svg"
            alt="Atardecer compartido juntos"
            loading="lazy"
          />
        </figure>
        <p class="lyric">“frase”</p>
      </section>

      <section class="memory section reveal">
        <figure class="photo-card">
          <img
            src="assets/photo-4.svg"
            alt="Celebrando un momento especial"
            loading="lazy"
          />
        </figure>
        <p class="lyric">“frase”</p>
      </section>

      <section class="section ending reveal">
        <h2>Te quiero mucho</h2>
        <p>
          Gracias por cada risa, cada charla y cada recuerdo. Ojalá este regalo te saque al menos una sonrisa we.
        </p>
      </section>
    </main>

    <footer class="footer">
      <p>Hecho con mi</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
